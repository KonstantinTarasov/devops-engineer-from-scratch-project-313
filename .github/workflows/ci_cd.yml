name: ci-cd
# 1. ТРИГГЕРЫ (Когда запускать? при пуше на main)
on:
  push:
    branches:
      main

# 2. ЗАДАНИЯ (Jobs, что делать)
jobs:
  # --- ЗАДАНИЕ 1: Линтинг и тестирование ---
  test-and-lint:
    name: Run Linters and Tests
    runs-on: ubuntu-latest # Используем последнюю версию Ubuntu
    steps:

      # Шаг 1.1: Скачиваем наш код из репозитория на виртуальную машину
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 1.2: Установка uv
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      # Шаг 1.3: Проверка кода линтером Ruff
      - name: Run Ruff Linter
        run: make lint

      # Шаг 1.4: Запуск тестов
      - name: Run Pytest
        run: make test